apiVersion: apps/v1
kind: Deployment
metadata:
  name: khabar-cut-deployment
  labels:
    app: khabar-cut
spec:
  replicas: 3
  selector:
    matchLabels:
      app: khabar-cut
  template:
    metadata:
      labels:
        app: khabar-cut
    spec:
      containers:
      - name: khabar-cut-app
        image: khabar-cut-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: url
        resources:
          limits:
            cpu: "1"
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: khabar-cut-service
spec:
  selector:
    app: khabar-cut
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
